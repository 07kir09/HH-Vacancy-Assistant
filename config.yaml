app:
  user_config_version: 2

hh:
  base_url: "https://api.hh.ru"
  auth_url: "https://hh.ru/oauth/authorize"
  token_url: "https://api.hh.ru/token"
  redirect_uri: "http://localhost:8080/callback"
  user_agent: "HH-Vacancy-Assistant/1.0 (contact-email-required)"

storage:
  sqlite_path: "job_apply_bot.db"

search:
  keywords: []
  areas: []
  period_days: 14
  per_page: 20
  pages_per_keyword: 1
  currency: "RUR"
  desired_salary: null
  only_with_salary: false
  experience: []
  employment: []
  work_format: []
  schedule: []
  excluded_text: ""
  # Optional independent strategies. Each one can override search fields and filters.
  # strategies:
  #   - name: "Product analytics"
  #     keywords: ["Product Analyst", "Product Data Analyst"]
  #     filters:
  #       min_score: 75
  #   - name: "Data analytics"
  #     keywords: ["Data Analyst", "BI Analyst"]
  #     enabled: true

filters:
  min_score: 65
  recommended_score: 80
  max_required_years: 99
  block_already_applied: true
  block_archived: true
  block_tests: false
  allow_no_salary: true
  allow_remote: true
  allow_relocation: true
  # Optional filters managed from the web questionnaire.
  english_level: ""
  blocked_companies: []
  block_recruiting_agencies: true
  allowed_area_ids: []
  target_titles: []
  positive_keywords: []
  negative_keywords: []

limits:
  max_drafts_per_scan: 20
  max_sends_per_day: 5
  request_delay_seconds: 0.3

# Telegram is optional. Keep enabled: false until you create a bot and learn your chat_id.
notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
