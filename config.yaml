hh:
  base_url: "https://api.hh.ru"
  auth_url: "https://hh.ru/oauth/authorize"
  token_url: "https://api.hh.ru/token"
  redirect_uri: "http://localhost:8080/callback"
  user_agent: "HH-Vacancy-Assistant/1.0 (contact-email-required)"

storage:
  sqlite_path: "job_apply_bot.db"

search:
  keywords:
    - "Data Analyst"
    - "Product Analyst"
    - "SQL"
    - "Python"
    - "BI"
  areas:
    - "1"
  period_days: 14
  per_page: 20
  pages_per_keyword: 1
  currency: "RUR"
  desired_salary: 180000
  only_with_salary: false
  experience:
    - "noExperience"
    - "between1And3"
    - "between3And6"
  employment:
    - "full"
  work_format:
    - "REMOTE"
    - "HYBRID"
    - "ON_SITE"
  schedule:
    - "remote"
    - "fullDay"
  excluded_text: "java,c++,c#,php,1c,bitrix,devops,qa,tester,support"
  # Optional independent strategies. Each one can override search fields and filters.
  # strategies:
  #   - name: "Product analytics"
  #     keywords: ["Product Analyst", "Product Data Analyst"]
  #     filters:
  #       min_score: 75
  #   - name: "Data analytics"
  #     keywords: ["Data Analyst", "BI Analyst"]
  #     enabled: true

filters:
  min_score: 65
  recommended_score: 80
  max_required_years: 4
  block_already_applied: true
  block_archived: true
  block_tests: false
  allow_no_salary: true
  allow_remote: true
  allow_relocation: true
  # Optional filters managed from the web questionnaire.
  english_level: ""
  blocked_companies: []
  block_recruiting_agencies: true
  allowed_area_ids:
    - "1"
  target_titles:
    - "data analyst"
    - "product analyst"
    - "analyst"
    - "bi analyst"
    - "sql analyst"
  positive_keywords:
    - "sql"
    - "python"
    - "dashboard"
    - "tableau"
    - "power bi"
    - "looker"
    - "a/b"
    - "ab test"
    - "product metrics"
    - "etl"
    - "airflow"
    - "pandas"
    - "statistics"
  negative_keywords:
    - "senior"
    - "lead"
    - "head of"
    - "architect"
    - "java"
    - "c++"
    - "c#"
    - "php"
    - "1c"
    - "bitrix"
    - "devops"
    - "qa"
    - "tester"
    - "technical support"

limits:
  max_drafts_per_scan: 20
  max_sends_per_day: 5
  request_delay_seconds: 0.3

# Telegram is optional. Keep enabled: false until you create a bot and learn your chat_id.
notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
